openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Plutonium SMP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: store
    description: Store items
  - name: purchases
    description: Purchases
  - name: tickets
    description: Support tickets
  - name: admin
    description: Admin operations
  - name: server
    description: Server stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/send-otp:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOtpRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpRequest"
      responses:
        "200":
          description: OTP valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user (requires OTP verification first)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /store/items:
    get:
      operationId: getStoreItems
      tags: [store]
      summary: Get all store items
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Store items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreItem"

  /store/items/{id}:
    get:
      operationId: getStoreItem
      tags: [store]
      summary: Get store item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreItem"

  /store/purchase:
    post:
      operationId: purchaseItem
      tags: [purchases]
      summary: Purchase a store item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseRequest"
      responses:
        "200":
          description: Purchase successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /store/checkout/send-otp:
    post:
      operationId: sendCheckoutOtp
      tags: [purchases]
      summary: Send OTP to verify checkout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /store/checkout:
    post:
      operationId: cartCheckout
      tags: [purchases]
      summary: Checkout cart (requires OTP verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartCheckoutRequest"
      responses:
        "200":
          description: Order placed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/profile-picture:
    put:
      operationId: updateProfilePicture
      tags: [users]
      summary: Update user profile picture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfilePictureRequest"
      responses:
        "200":
          description: Profile picture updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/purchases:
    get:
      operationId: getUserPurchases
      tags: [users]
      summary: Get user purchase history
      responses:
        "200":
          description: Purchase history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"

  /tickets:
    get:
      operationId: getTickets
      tags: [tickets]
      summary: Get user's tickets
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "200":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketWithMessages"

  /tickets/{id}/messages:
    post:
      operationId: sendTicketMessage
      tags: [tickets]
      summary: Send a message in a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketMessage"

  /tickets/{id}/close:
    post:
      operationId: closeTicket
      tags: [tickets]
      summary: Close a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /server/status:
    get:
      operationId: getServerStatus
      tags: [server]
      summary: Get server status
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [server]
      summary: Get leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"

  /admin/users/{id}/ban:
    post:
      operationId: adminBanUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanRequest"
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/unban:
    post:
      operationId: adminUnbanUser
      tags: [admin]
      summary: Unban a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User unbanned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/store/items:
    post:
      operationId: adminCreateStoreItem
      tags: [admin]
      summary: Create a store item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreItemRequest"
      responses:
        "200":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreItem"

  /admin/store/items/{id}:
    put:
      operationId: adminUpdateStoreItem
      tags: [admin]
      summary: Update a store item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreItem"
    delete:
      operationId: adminDeleteStoreItem
      tags: [admin]
      summary: Delete a store item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Item deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/tickets:
    get:
      operationId: adminGetTickets
      tags: [admin]
      summary: Get all tickets (admin)
      responses:
        "200":
          description: All tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get admin stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/purchases:
    get:
      operationId: adminGetPurchases
      tags: [admin]
      summary: Get all purchases (admin)
      responses:
        "200":
          description: All purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"

  /admin/announcements:
    get:
      operationId: adminGetAnnouncements
      tags: [admin]
      summary: Get announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: adminCreateAnnouncement
      tags: [admin]
      summary: Create announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "200":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/coupons:
    get:
      operationId: adminGetCoupons
      tags: [admin]
      summary: Get coupons
      responses:
        "200":
          description: Coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      operationId: adminCreateCoupon
      tags: [admin]
      summary: Create coupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponRequest"
      responses:
        "200":
          description: Coupon created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /admin/currency/adjust:
    post:
      operationId: adminAdjustCurrency
      tags: [admin]
      summary: Adjust user currency (OWO coins)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CurrencyAdjustRequest"
      responses:
        "200":
          description: Currency adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/roles:
    get:
      operationId: adminGetRoles
      tags: [admin]
      summary: Get all roles
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

  /announcements:
    get:
      operationId: getAnnouncements
      tags: [server]
      summary: Get public announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SendOtpRequest:
      type: object
      properties:
        email:
          type: string
        purpose:
          type: string
          enum: [registration, login]
      required:
        - email
        - purpose

    VerifyOtpRequest:
      type: object
      properties:
        email:
          type: string
        code:
          type: string
        purpose:
          type: string
          enum: [registration, login]
      required:
        - email
        - code
        - purpose

    CartCheckoutRequest:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: string
              quantity:
                type: integer
            required:
              - itemId
              - quantity
        couponCode:
          type: string
        otpCode:
          type: string
      required:
        - items
        - otpCode

    UpdateProfilePictureRequest:
      type: object
      properties:
        avatarUrl:
          type: string
      required:
        - avatarUrl

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        minecraftUsername:
          type: string
        otpCode:
          type: string
      required:
        - username
        - email
        - password
        - otpCode

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, moderator, admin, owner]
        discordId:
          type: string
        discordUsername:
          type: string
        discordAvatar:
          type: string
        minecraftUsername:
          type: string
        owoBalance:
          type: integer
        isBanned:
          type: boolean
        banReason:
          type: string
        activeRank:
          type: string
        createdAt:
          type: string
      required:
        - id
        - username
        - email
        - role
        - owoBalance
        - isBanned
        - createdAt

    StoreItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [ranks, crate_keys, coins, cosmetics]
        price:
          type: integer
        currency:
          type: string
          enum: [owo, usd]
        imageUrl:
          type: string
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        badge:
          type: string
        badgeColor:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - description
        - category
        - price
        - currency
        - isActive
        - isFeatured
        - createdAt

    CreateStoreItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
        price:
          type: integer
        currency:
          type: string
        imageUrl:
          type: string
        features:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        isFeatured:
          type: boolean
        badge:
          type: string
        badgeColor:
          type: string
      required:
        - name
        - description
        - category
        - price
        - currency

    PurchaseRequest:
      type: object
      properties:
        itemId:
          type: string
        couponCode:
          type: string
      required:
        - itemId

    Purchase:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        itemId:
          type: string
        itemName:
          type: string
        itemCategory:
          type: string
        pricePaid:
          type: integer
        currency:
          type: string
        couponUsed:
          type: string
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        createdAt:
          type: string
      required:
        - id
        - userId
        - itemId
        - itemName
        - itemCategory
        - pricePaid
        - currency
        - status
        - createdAt

    Ticket:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        username:
          type: string
        subject:
          type: string
        category:
          type: string
          enum: [support, purchase_issues, report_player, general]
        status:
          type: string
          enum: [open, pending, closed]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - subject
        - category
        - status
        - priority
        - messageCount
        - createdAt
        - updatedAt

    TicketMessage:
      type: object
      properties:
        id:
          type: string
        ticketId:
          type: string
        userId:
          type: string
        username:
          type: string
        role:
          type: string
        content:
          type: string
        isStaff:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - ticketId
        - userId
        - username
        - content
        - isStaff
        - createdAt

    TicketWithMessages:
      type: object
      properties:
        ticket:
          $ref: "#/components/schemas/Ticket"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/TicketMessage"
      required:
        - ticket
        - messages

    CreateTicketRequest:
      type: object
      properties:
        subject:
          type: string
        category:
          type: string
        priority:
          type: string
        message:
          type: string
      required:
        - subject
        - category
        - message

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    ServerStatus:
      type: object
      properties:
        online:
          type: boolean
        players:
          type: integer
        maxPlayers:
          type: integer
        version:
          type: string
        ip:
          type: string
        uptime:
          type: string
        tps:
          type: number
      required:
        - online
        - players
        - maxPlayers
        - ip

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        username:
          type: string
        minecraftUsername:
          type: string
        hearts:
          type: integer
        kills:
          type: integer
        owoBalance:
          type: integer
        activeRank:
          type: string
        avatarUrl:
          type: string
      required:
        - rank
        - userId
        - username
        - hearts
        - kills
        - owoBalance

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalRevenue:
          type: integer
        totalPurchases:
          type: integer
        openTickets:
          type: integer
        activeRanks:
          type: integer
        bannedUsers:
          type: integer
        newUsersToday:
          type: integer
        revenueToday:
          type: integer
      required:
        - totalUsers
        - totalRevenue
        - totalPurchases
        - openTickets
        - activeRanks
        - bannedUsers
        - newUsersToday
        - revenueToday

    PaginatedUsers:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - users
        - total
        - page
        - limit

    BanRequest:
      type: object
      properties:
        reason:
          type: string
      required:
        - reason

    Announcement:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [info, warning, update, event]
        isActive:
          type: boolean
        createdAt:
          type: string
        authorId:
          type: string
        authorName:
          type: string
      required:
        - id
        - title
        - content
